services:
  - type: web
    name: auto-pinger
    env: python
    region: singapore # You can change this to oregon, frankfurt, etc.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn auto_pinger:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120"
    plan: free # Can be updated to starter or standard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Ensures Render uses a modern Python version
