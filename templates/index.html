<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Pinger - Keep Apps Awake</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #334155;
            --log-bg: #020617;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge.stopped {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-badge.running {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
        }

        .running .status-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background-color: var(--log-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            resize: vertical;
            font-family: monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background-color: var(--accent);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .btn-stop {
            background-color: var(--danger);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            background-color: var(--danger-hover);
        }

        .logs-container {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            flex: none;
        }

        .btn-clear:hover {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.1);
        }

        .log-box {
            background-color: var(--log-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .log-line {
            margin-bottom: 0.25rem;
            word-break: break-all;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .log-line:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .toast.show {
            transform: translateY(0);
        }

        /* Custom Scrollbar for the log box */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--log-bg);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 600px) {
            .actions {
                flex-direction: column;
            }
            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🚀 Auto Pinger</h1>
            <div id="statusBadge" class="status-badge stopped">
                <span class="status-dot"></span>
                <span id="statusText">STOPPED</span>
            </div>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="urlsInput">Target URLs (One per line)</label>
                <textarea id="urlsInput" placeholder="https://your-app-1.onrender.com&#10;https://your-app-2.herokuapp.com" spellcheck="false"></textarea>
            </div>

            <div class="actions">
                <button id="btnStart" class="btn-start" onclick="startPinger()">
                    ▶ Start Pinging
                </button>
                <button id="btnStop" class="btn-stop" onclick="stopPinger()" disabled>
                    ■ Stop
                </button>
            </div>

            <div class="logs-container">
                <div class="logs-header">
                    <label>Live Logs (Random 30s-120s intervals)</label>
                    <button class="btn-clear" onclick="clearLogs()">Clear Logs</button>
                </div>
                <div id="logBox" class="log-box">
                    <!-- Logs will appear here -->
                    <div class="log-line" style="color: var(--text-muted)">Awaiting logs... Start the pinger to see activity.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Message here</div>

    <script>
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const urlsInput = document.getElementById('urlsInput');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const logBox = document.getElementById('logBox');
        
        let logPollInterval = null;

        // format colors
        function formatLogLine(text) {
            let className = '';
            if (text.includes('SUCCESS') || text.includes('✅')) className = 'log-success';
            else if (text.includes('ERROR') || text.includes('❌')) className = 'log-error';
            else if (text.includes('WARNING') || text.includes('⚠️')) className = 'log-warning';
            else className = 'log-info';

            return `<div class="log-line ${className}">${escapeHtml(text)}</div>`;
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--success)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateUIState(isRunning) {
            if (isRunning) {
                btnStart.disabled = true;
                btnStop.disabled = false;
                urlsInput.disabled = true;
                statusBadge.className = 'status-badge running';
                statusText.textContent = 'RUNNING';
                if (!logPollInterval) startLogPolling();
            } else {
                btnStart.disabled = false;
                btnStop.disabled = true;
                urlsInput.disabled = false;
                statusBadge.className = 'status-badge stopped';
                statusText.textContent = 'STOPPED';
                if (logPollInterval) {
                    clearInterval(logPollInterval);
                    logPollInterval = null;
                }
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateUIState(data.is_running);
                if (data.urls && data.urls.length > 0 && !urlsInput.value) {
                    urlsInput.value = data.urls.join('\n');
                }
            } catch (err) {
                console.error("Failed to fetch status", err);
            }
        }

        async function startPinger() {
            const urls = urlsInput.value.trim();
            if (!urls) {
                showToast("Please enter at least one URL", true);
                return;
            }

            btnStart.disabled = true;
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast("Pinger started successfully!");
                    updateUIState(true);
                    fetchLogs(); // immediate fetch
                } else {
                    showToast(data.message || "Failed to start", true);
                    btnStart.disabled = false;
                }
            } catch (err) {
                showToast("Server error", true);
                btnStart.disabled = false;
            }
        }

        async function stopPinger() {
            btnStop.disabled = true;
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast("Pinger stopped");
                    updateUIState(false);
                    fetchLogs(); // fetch final logs
                } else {
                    showToast(data.message || "Failed to stop", true);
                    btnStop.disabled = false;
                }
            } catch (err) {
                showToast("Server error", true);
                btnStop.disabled = false;
            }
        }

        let lastLogCount = 0;
        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                
                if (data.logs && data.logs.length > 0) {
                    // Only update DOM if new logs arrived
                    if (data.logs.length !== lastLogCount) {
                        const html = data.logs.map(formatLogLine).join('');
                        const wasScrolledToBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 20;
                        
                        logBox.innerHTML = html;
                        lastLogCount = data.logs.length;
                        
                        // Auto scroll to bottom
                        if (wasScrolledToBottom || lastLogCount === data.logs.length) {
                            logBox.scrollTop = logBox.scrollHeight;
                        }
                    }
                } else if (data.logs.length === 0) {
                    logBox.innerHTML = '<div class="log-line" style="color: var(--text-muted)">Logs cleared. Awaiting new activity...</div>';
                    lastLogCount = 0;
                }
            } catch (err) {
                console.error("Failed to fetch logs", err);
            }
        }

        async function clearLogs() {
            try {
                await fetch('/api/clear_logs', { method: 'POST' });
                fetchLogs();
                showToast("Logs cleared");
            } catch (err) {
                showToast("Failed to clear logs", true);
            }
        }

        function startLogPolling() {
            // Poll logs every 2 seconds
            logPollInterval = setInterval(fetchLogs, 2000);
        }

        // Init
        fetchStatus();
        fetchLogs();
    </script>
</body>
</html>
